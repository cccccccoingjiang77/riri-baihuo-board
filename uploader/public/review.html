<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>日百看板 · 审核区</title>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --line:#2a2f3a; --gold:#e8b64c;
    --txt:#e8eaed; --sub:#9aa0aa; --green:#37c98a; --red:#e26d6d; --blue:#4b8bf5;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6}
  .topbar{background:var(--card);border-bottom:1px solid var(--line);padding:14px 0}
  .topbar .in{max-width:900px;margin:0 auto;padding:0 18px;display:flex;align-items:center;gap:10px}
  .dot{background:var(--gold);color:#1a1d24;width:26px;height:26px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-weight:700}
  .wrap{max-width:900px;margin:0 auto;padding:24px 18px 80px}
  h1{font-size:20px;margin:10px 0 4px}
  .sub{color:var(--sub);font-size:13px;margin-bottom:18px}
  .bar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  input[type=password]{background:#12151b;border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:10px 12px;font-size:14px;outline:none;flex:1;min-width:180px}
  input[type=text],input[type=url],textarea{width:100%;background:#12151b;border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:10px 12px;font-size:13px;outline:none;font-family:inherit}
  input:focus,textarea:focus{border-color:var(--gold)}
  textarea{min-height:72px;resize:vertical}
  .btn{background:var(--gold);color:#1a1d24;border:0;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .btn.green{background:var(--green);color:#0f1115}
  .btn.red{background:transparent;border:1px solid var(--red);color:var(--red)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .empty{text-align:center;color:var(--sub);padding:50px 0}
  .item{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
  .item-h{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .item-h .name{font-size:17px;font-weight:700;color:var(--gold)}
  .item-h .meta{font-size:12px;color:var(--sub)}
  .metrics{display:flex;gap:14px;flex-wrap:wrap;margin:12px 0;font-size:13px}
  .metrics span b{color:var(--txt)}
  .sect{margin-top:12px}
  .sect .t{font-size:12px;color:var(--sub);margin-bottom:5px}
  .tags span{display:inline-block;background:#12151b;border:1px solid var(--line);border-radius:6px;padding:3px 9px;margin:2px 4px 0 0;font-size:12px}
  .ctx{background:#12151b;border:1px solid var(--line);border-radius:8px;padding:8px 11px;margin:5px 0;font-size:12px}
  .ctx b{color:var(--gold)}
  .scripts div{font-size:12px;color:var(--sub);margin:2px 0}
  .kp{font-size:12px;margin:4px 0}
  .kp b{color:var(--txt)}
  .notes{background:#12151b;border-left:3px solid var(--blue);padding:8px 12px;font-size:12px;color:var(--sub);margin:10px 0;border-radius:6px}
  .actions{display:flex;gap:10px;margin-top:16px;border-top:1px solid var(--line);padding-top:14px}
  .msg{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
  .msg.show{display:block}
  .msg.ok{background:rgba(55,201,138,.12);border:1px solid var(--green);color:var(--green)}
  .msg.err{background:rgba(226,109,109,.12);border:1px solid var(--red);color:var(--red)}
  .msg.load{background:rgba(75,139,245,.12);border:1px solid var(--blue);color:var(--blue)}
  details{margin-top:10px}
  summary{cursor:pointer;color:var(--sub);font-size:12px}
  pre{background:#0b0d11;border:1px solid var(--line);border-radius:8px;padding:12px;overflow:auto;font-size:11px;color:var(--sub);max-height:280px}
  .activity-admin{background:linear-gradient(140deg,#132349,#164d91);border:1px solid #3475bf;border-radius:14px;padding:18px;margin-bottom:26px}
  .activity-admin h2{font-size:17px;margin:0 0 4px}.activity-form{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .field label{display:block;color:#b8c8df;font-size:11px;margin-bottom:5px}.field.full{grid-column:1/-1}
  .activity-preview{display:flex;align-items:center;justify-content:center;min-height:130px;background:rgba(5,14,36,.45);border:1px dashed rgba(160,205,255,.4);border-radius:10px;padding:10px;margin-top:12px}
  .activity-preview img{max-width:100%;max-height:160px;object-fit:contain}.toggle{display:flex;align-items:center;gap:8px;font-size:13px;margin-right:auto}
  @media(max-width:650px){.activity-form{grid-template-columns:1fr}.field.full{grid-column:auto}}
</style>
</head>
<body>
<div class="topbar"><div class="in"><span class="dot">日</span><b>日百看板 · 审核区</b></div></div>
<div class="wrap">
  <section class="activity-admin">
    <h2>平台限时活动</h2>
    <div class="sub" style="margin-bottom:0">由主管理员配置首页活动 Banner，保存后自动推送上线。</div>
    <div class="activity-form">
      <div class="field"><label>区域标题</label><input type="text" id="actTitle" value="平台限时活动"></div>
      <div class="field"><label>Banner 图片地址（站内相对路径或 HTTPS）</label><input type="text" id="actImage"></div>
      <div class="field full"><label>活动文案</label><textarea id="actText"></textarea></div>
      <div class="field full"><label>活动跳转链接</label><input type="url" id="actLink"></div>
    </div>
    <div class="activity-preview"><img id="actPreview" alt="活动 Banner 预览"></div>
    <div class="actions">
      <label class="toggle"><input type="checkbox" id="actEnabled" checked> 首页展示该活动</label>
      <button class="btn ghost" id="loadActivityBtn">读取当前配置</button>
      <button class="btn green" id="saveActivityBtn">保存并发布</button>
    </div>
  </section>

  <h1>待审核数据</h1>
  <div class="sub">审核同事上传后 AI 产出的赛道分析，通过即自动合并进线上看板（保留 Top 素材等原有内容），驳回则丢弃。</div>

  <div class="bar">
    <input type="password" id="token" placeholder="输入审核口令">
    <button class="btn" id="loadBtn">加载待审</button>
    <button class="btn ghost" id="refreshBtn">刷新</button>
    <a class="btn ghost" href="https://cccccccoingjiang77.github.io/riri-baihuo-board/site/creative.html" target="_blank" style="text-decoration:none">看线上看板 ↗</a>
  </div>

  <div class="msg" id="msg"></div>
  <div id="list"></div>
</div>

<script>
const API = "";
const msg = document.getElementById("msg");
const list = document.getElementById("list");
let cache = [];

function show(type,text){ msg.className="msg show "+type; msg.textContent=text; }
function getToken(){ return document.getElementById("token").value.trim(); }

document.getElementById("loadBtn").onclick = load;
document.getElementById("refreshBtn").onclick = load;
document.getElementById("loadActivityBtn").onclick = loadActivity;
document.getElementById("saveActivityBtn").onclick = saveActivity;
document.getElementById("actImage").addEventListener("input", updateActivityPreview);

function updateActivityPreview(){
  const image = document.getElementById("actImage").value.trim();
  const preview = document.getElementById("actPreview");
  preview.src = image.startsWith("http") ? image : "https://cccccccoingjiang77.github.io/riri-baihuo-board/site/" + image.replace(/^\.\//,"");
}

function fillActivity(activity){
  if(!activity) return;
  document.getElementById("actTitle").value = activity.title || "平台限时活动";
  document.getElementById("actImage").value = activity.image || "";
  document.getElementById("actText").value = activity.text || "";
  document.getElementById("actLink").value = activity.link || "";
  document.getElementById("actEnabled").checked = activity.enabled !== false;
  updateActivityPreview();
}

async function loadActivity(){
  const token = getToken();
  if(!token) return show("err","请输入审核口令");
  show("load","正在读取活动配置…");
  try{
    const r = await fetch(API + "/api/activity?token=" + encodeURIComponent(token));
    const j = await r.json();
    if(!r.ok || j.error) throw new Error(j.error || "读取失败");
    fillActivity(j.activity); show("ok","当前活动配置已加载");
  }catch(e){ show("err","❌ "+e.message); }
}

async function saveActivity(){
  const token = getToken();
  if(!token) return show("err","请输入审核口令");
  const activity = {
    enabled: document.getElementById("actEnabled").checked,
    title: document.getElementById("actTitle").value.trim(),
    image: document.getElementById("actImage").value.trim(),
    text: document.getElementById("actText").value.trim(),
    link: document.getElementById("actLink").value.trim(),
  };
  if(!activity.image || !activity.text || !activity.link) return show("err","请完整填写图片、文案和跳转链接");
  if(!confirm("确认保存并发布本次平台活动？")) return;
  const btn = document.getElementById("saveActivityBtn"); btn.disabled = true;
  show("load","正在保存并推送首页活动…");
  try{
    const r = await fetch(API + "/api/activity",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,activity})});
    const j = await r.json();
    if(!r.ok || j.error) throw new Error(j.error || "保存失败");
    fillActivity(j.activity); show("ok","✅ "+j.message);
  }catch(e){ show("err","❌ "+e.message); }
  finally{ btn.disabled = false; }
}

async function load(){
  const token = getToken();
  if(!token) return show("err","请输入审核口令");
  show("load","加载中…");
  try{
    const r = await fetch(API + "/api/pending?token=" + encodeURIComponent(token));
    const j = await r.json();
    if(!r.ok || j.error) throw new Error(j.error || "加载失败");
    cache = j.records || [];
    msg.className="msg";
    render();
  }catch(e){ show("err","❌ "+e.message); }
}

function render(){
  if(!cache.length){ list.innerHTML = `<div class="empty">🎉 暂无待审核数据</div>`; return; }
  list.innerHTML = cache.map(rec=>{
    const isSelection = rec.type === "selection";
    
    // ============ 如果是选品类型的记录 ============
    if (isSelection) {
      const items = rec.items || {};
      const nonC = items.nonClosed || [];
      const qyt = items.quanyutong || [];
      const adq = items.adq || [];

      const renderProductGrid = (title, arr) => {
        const rows = arr.slice(0, 10).map(x => `
          <div style="display:flex;align-items:center;gap:10px;background:#12151b;padding:8px;border-radius:8px;border:1px solid var(--line)">
            <img src="${x.image}" style="width:36px;height:36px;border-radius:6px;object-fit:cover" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'36\' height=\'36\'><rect width=\'36\' height=\'36\' fill=\'%231a1d24\'/><text x=\'50%\' y=\'50%\' font-size=\'11\' fill=\'%23555\' dominant-baseline=\'middle\' text-anchor=\'middle\'>无图</text></svg>'">
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)">${x.name}</div>
              <div style="font-size:11px;color:var(--sub)">¥${x.price} · ROI: <b style="color:var(--gold)">${x.roi}</b> · 创意: 🔥${x.dupCount||1}条</div>
            </div>
          </div>
        `).join("");
        
        return `
          <div class="sect" style="margin-top:14px">
            <div class="t" style="font-size:13px;font-weight:bold;color:var(--gold);margin-bottom:8px">${title} (共 ${arr.length} 款，展示前10)</div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));gap:8px">
              ${rows || `<div style="grid-column:1/-1;color:var(--sub);font-size:11px">暂无推荐爆品</div>`}
            </div>
          </div>
        `;
      };

      return `<div class="item" data-id="${rec.id}">
        <div class="item-h">
          <div>
            <div class="name" style="color:var(--green)">🛒 选品看板更新 · ${rec.trackName}</div>
            <div class="meta">📄 ${rec.filename||"-"} · 提交于 ${(rec.submittedAt||"").replace("T"," ").slice(0,16)}</div>
          </div>
        </div>
        ${rec.notes?`<div class="notes">📝 上传备注：${rec.notes}</div>`:""}
        
        ${renderProductGrid("非闭环链路 (CID)", nonC)}
        ${renderProductGrid("闭环全域通 (QYT)", qyt)}
        ${renderProductGrid("闭环ADQ", adq)}
        
        <details style="margin-top:14px"><summary>查看选品 JSON 数据</summary><pre>${escapeHtml(JSON.stringify(items,null,2))}</pre></details>
        
        <div class="actions">
          <button class="btn green" onclick="approve('${rec.id}',this)">✔ 审核通过（合并上线）</button>
          <button class="btn red" onclick="reject('${rec.id}',this)">✕ 驳回并删除</button>
        </div>
      </div>`;
    }

    // ============ 如果是创意卖点类型的记录 ============
    const t = rec.track||{}; const m = t.metrics||{};
    const sw = (t.sellingWords||[]).map(w=>`<span>${w.word}<b style="color:var(--gold)"> ${w.weight}</b></span>`).join("");
    const pw = (t.painWords||[]).map(w=>`<span>${w.word}</span>`).join("");
    const ctx = (t.sellingContext||[]).map(c=>`<div class="ctx">🎯 <b>${c.driver}</b><br>${c.need}<br><span style="color:var(--sub)">卖点词：${(c.words||[]).join("、")}</span></div>`).join("");
    const scripts = (t.scripts||[]).map(s=>`<div>· ${s}</div>`).join("");
    const kp = (t.keyPoints||[]).map(k=>`<div class="kp"><b>${k.title}：</b>${k.desc}</div>`).join("");
    return `<div class="item" data-id="${rec.id}">
      <div class="item-h">
        <div><div class="name">🎬 创意卖点更新 · ${t.name||rec.trackName}</div>
        <div class="meta">📄 ${rec.filename||"-"} · 提交于 ${(rec.submittedAt||"").replace("T"," ").slice(0,16)}</div></div>
      </div>
      ${rec.notes?`<div class="notes">📝 上传备注：${rec.notes}</div>`:""}
      <div class="metrics">
        <span>创意 <b>${m.creativeCount||"-"}</b></span>
        <span>CTR <b>${m.ctr||"-"}%</b></span>
        <span>3s完播 <b>${m.play3s||"-"}%</b></span>
        <span>CVR <b>${m.cvr||"-"}%</b></span>
        <span>CPM <b>${m.cpm||"-"}</b></span>
      </div>
      <div class="sect"><div class="t">卖点词云</div><div class="tags">${sw}</div></div>
      ${pw?`<div class="sect"><div class="t">用户痛点</div><div class="tags">${pw}</div></div>`:""}
      <div class="sect"><div class="t">卖点动因·需求背景</div>${ctx}</div>
      <div class="sect"><div class="t">爆款话术</div><div class="scripts">${scripts}</div></div>
      <div class="sect"><div class="t">跑量关键点</div>${kp}</div>
      <details><summary>查看原始 JSON</summary><pre>${escapeHtml(JSON.stringify(t,null,2))}</pre></details>
      <div class="actions">
        <button class="btn green" onclick="approve('${rec.id}',this)">✔ 审核通过（合并上线）</button>
        <button class="btn red" onclick="reject('${rec.id}',this)">✕ 驳回并删除</button>
      </div>
    </div>`;
  }).join("");
}

function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

async function approve(id, btnEl){
  const token = getToken();
  if(!confirm("确认通过？将合并进线上看板并推送。")) return;
  const item = btnEl.closest(".item"); item.querySelectorAll("button").forEach(b=>b.disabled=true);
  show("load","正在合并并推送上线…");
  try{
    const r = await fetch(API + "/api/approve",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,id})});
    const j = await r.json();
    if(!r.ok||j.error) throw new Error(j.error||"审核失败");
    show("ok","✅ "+j.message);
    cache = cache.filter(x=>x.id!==id); render();
  }catch(e){ show("err","❌ "+e.message); item.querySelectorAll("button").forEach(b=>b.disabled=false); }
}

async function reject(id, btnEl){
  const token = getToken();
  if(!confirm("确认驳回并删除该记录？")) return;
  const item = btnEl.closest(".item"); item.querySelectorAll("button").forEach(b=>b.disabled=true);
  show("load","驳回中…");
  try{
    const r = await fetch(API + "/api/reject",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,id})});
    const j = await r.json();
    if(!r.ok||j.error) throw new Error(j.error||"驳回失败");
    show("ok","已驳回");
    cache = cache.filter(x=>x.id!==id); render();
  }catch(e){ show("err","❌ "+e.message); item.querySelectorAll("button").forEach(b=>b.disabled=false); }
}
</script>
</body>
</html>
