<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>日百看板 · 审核区</title>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --line:#2a2f3a; --gold:#e8b64c;
    --txt:#e8eaed; --sub:#9aa0aa; --green:#37c98a; --red:#e26d6d; --blue:#4b8bf5;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6}
  .topbar{background:var(--card);border-bottom:1px solid var(--line);padding:14px 0}
  .topbar .in{max-width:900px;margin:0 auto;padding:0 18px;display:flex;align-items:center;gap:10px}
  .dot{background:var(--gold);color:#1a1d24;width:26px;height:26px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-weight:700}
  .wrap{max-width:900px;margin:0 auto;padding:24px 18px 80px}
  h1{font-size:20px;margin:10px 0 4px}
  .sub{color:var(--sub);font-size:13px;margin-bottom:18px}
  .bar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  input[type=password]{background:#12151b;border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:10px 12px;font-size:14px;outline:none;flex:1;min-width:180px}
  input:focus{border-color:var(--gold)}
  .btn{background:var(--gold);color:#1a1d24;border:0;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .btn.green{background:var(--green);color:#0f1115}
  .btn.red{background:transparent;border:1px solid var(--red);color:var(--red)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .empty{text-align:center;color:var(--sub);padding:50px 0}
  .item{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
  .item-h{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .item-h .name{font-size:17px;font-weight:700;color:var(--gold)}
  .item-h .meta{font-size:12px;color:var(--sub)}
  .metrics{display:flex;gap:14px;flex-wrap:wrap;margin:12px 0;font-size:13px}
  .metrics span b{color:var(--txt)}
  .sect{margin-top:12px}
  .sect .t{font-size:12px;color:var(--sub);margin-bottom:5px}
  .tags span{display:inline-block;background:#12151b;border:1px solid var(--line);border-radius:6px;padding:3px 9px;margin:2px 4px 0 0;font-size:12px}
  .ctx{background:#12151b;border:1px solid var(--line);border-radius:8px;padding:8px 11px;margin:5px 0;font-size:12px}
  .ctx b{color:var(--gold)}
  .scripts div{font-size:12px;color:var(--sub);margin:2px 0}
  .kp{font-size:12px;margin:4px 0}
  .kp b{color:var(--txt)}
  .notes{background:#12151b;border-left:3px solid var(--blue);padding:8px 12px;font-size:12px;color:var(--sub);margin:10px 0;border-radius:6px}
  .actions{display:flex;gap:10px;margin-top:16px;border-top:1px solid var(--line);padding-top:14px}
  .msg{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
  .msg.show{display:block}
  .msg.ok{background:rgba(55,201,138,.12);border:1px solid var(--green);color:var(--green)}
  .msg.err{background:rgba(226,109,109,.12);border:1px solid var(--red);color:var(--red)}
  .msg.load{background:rgba(75,139,245,.12);border:1px solid var(--blue);color:var(--blue)}
  details{margin-top:10px}
  summary{cursor:pointer;color:var(--sub);font-size:12px}
  pre{background:#0b0d11;border:1px solid var(--line);border-radius:8px;padding:12px;overflow:auto;font-size:11px;color:var(--sub);max-height:280px}
</style>
</head>
<body>
<div class="topbar"><div class="in"><span class="dot">日</span><b>日百看板 · 审核区</b></div></div>
<div class="wrap">
  <h1>待审核数据</h1>
  <div class="sub">审核同事上传后 AI 产出的赛道分析，通过即自动合并进线上看板（保留 Top 素材等原有内容），驳回则丢弃。</div>

  <div class="bar">
    <input type="password" id="token" placeholder="输入审核口令">
    <button class="btn" id="loadBtn">加载待审</button>
    <button class="btn ghost" id="refreshBtn">刷新</button>
    <a class="btn ghost" href="https://cccccccoingjiang77.github.io/riri-baihuo-board/site/creative.html" target="_blank" style="text-decoration:none">看线上看板 ↗</a>
  </div>

  <div class="msg" id="msg"></div>
  <div id="list"></div>
</div>

<script>
const API = "";
const msg = document.getElementById("msg");
const list = document.getElementById("list");
let cache = [];

function show(type,text){ msg.className="msg show "+type; msg.textContent=text; }
function getToken(){ return document.getElementById("token").value.trim(); }

document.getElementById("loadBtn").onclick = load;
document.getElementById("refreshBtn").onclick = load;

async function load(){
  const token = getToken();
  if(!token) return show("err","请输入审核口令");
  show("load","加载中…");
  try{
    const r = await fetch(API + "/api/pending?token=" + encodeURIComponent(token));
    const j = await r.json();
    if(!r.ok || j.error) throw new Error(j.error || "加载失败");
    cache = j.records || [];
    msg.className="msg";
    render();
  }catch(e){ show("err","❌ "+e.message); }
}

function render(){
  if(!cache.length){ list.innerHTML = `<div class="empty">🎉 暂无待审核数据</div>`; return; }
  list.innerHTML = cache.map(rec=>{
    const t = rec.track||{}; const m = t.metrics||{};
    const sw = (t.sellingWords||[]).map(w=>`<span>${w.word}<b style="color:var(--gold)"> ${w.weight}</b></span>`).join("");
    const pw = (t.painWords||[]).map(w=>`<span>${w.word}</span>`).join("");
    const ctx = (t.sellingContext||[]).map(c=>`<div class="ctx">🎯 <b>${c.driver}</b><br>${c.need}<br><span style="color:var(--sub)">卖点词：${(c.words||[]).join("、")}</span></div>`).join("");
    const scripts = (t.scripts||[]).map(s=>`<div>· ${s}</div>`).join("");
    const kp = (t.keyPoints||[]).map(k=>`<div class="kp"><b>${k.title}：</b>${k.desc}</div>`).join("");
    return `<div class="item" data-id="${rec.id}">
      <div class="item-h">
        <div><div class="name">${t.name||rec.trackName}</div>
        <div class="meta">📄 ${rec.filename||"-"} · 提交于 ${(rec.submittedAt||"").replace("T"," ").slice(0,16)}</div></div>
      </div>
      ${rec.notes?`<div class="notes">📝 上传备注：${rec.notes}</div>`:""}
      <div class="metrics">
        <span>创意 <b>${m.creativeCount||"-"}</b></span>
        <span>CTR <b>${m.ctr||"-"}%</b></span>
        <span>3s完播 <b>${m.play3s||"-"}%</b></span>
        <span>CVR <b>${m.cvr||"-"}%</b></span>
        <span>CPM <b>${m.cpm||"-"}</b></span>
      </div>
      <div class="sect"><div class="t">卖点词云</div><div class="tags">${sw}</div></div>
      ${pw?`<div class="sect"><div class="t">用户痛点</div><div class="tags">${pw}</div></div>`:""}
      <div class="sect"><div class="t">卖点动因·需求背景</div>${ctx}</div>
      <div class="sect"><div class="t">爆款话术</div><div class="scripts">${scripts}</div></div>
      <div class="sect"><div class="t">跑量关键点</div>${kp}</div>
      <details><summary>查看原始 JSON</summary><pre>${escapeHtml(JSON.stringify(t,null,2))}</pre></details>
      <div class="actions">
        <button class="btn green" onclick="approve('${rec.id}',this)">✔ 通过并上线</button>
        <button class="btn red" onclick="reject('${rec.id}',this)">✕ 驳回</button>
      </div>
    </div>`;
  }).join("");
}

function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

async function approve(id, btnEl){
  const token = getToken();
  if(!confirm("确认通过？将合并进线上看板并推送。")) return;
  const item = btnEl.closest(".item"); item.querySelectorAll("button").forEach(b=>b.disabled=true);
  show("load","正在合并并推送上线…");
  try{
    const r = await fetch(API + "/api/approve",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,id})});
    const j = await r.json();
    if(!r.ok||j.error) throw new Error(j.error||"审核失败");
    show("ok","✅ "+j.message);
    cache = cache.filter(x=>x.id!==id); render();
  }catch(e){ show("err","❌ "+e.message); item.querySelectorAll("button").forEach(b=>b.disabled=false); }
}

async function reject(id, btnEl){
  const token = getToken();
  if(!confirm("确认驳回并删除该记录？")) return;
  const item = btnEl.closest(".item"); item.querySelectorAll("button").forEach(b=>b.disabled=true);
  show("load","驳回中…");
  try{
    const r = await fetch(API + "/api/reject",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,id})});
    const j = await r.json();
    if(!r.ok||j.error) throw new Error(j.error||"驳回失败");
    show("ok","已驳回");
    cache = cache.filter(x=>x.id!==id); render();
  }catch(e){ show("err","❌ "+e.message); item.querySelectorAll("button").forEach(b=>b.disabled=false); }
}
</script>
</body>
</html>
